<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psy-Nexus Template-Tool</title>
    <style>
        :root {
            --cosmic-primary: #ff00cc;
            --psychedelic-accent: #01ff4f;
            --deep-space-bg: #1a0b2e;
            --neon-highlight: #ff01d7;
            --accessible-text: #ffffff;
            --high-contrast: #000000;
            --card-bg: rgba(42, 42, 42, 0.5);
            --input-bg: rgba(51, 51, 51, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--deep-space-bg);
            background-image: radial-gradient(circle at center, #000000 0%, #1a0b2e 100%);
            color: var(--accessible-text);
            padding: 20px;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: 
                radial-gradient(circle at 10% 50%, rgba(255, 0, 204, 0.3) 0%, rgba(255, 0, 204, 0) 60%),
                radial-gradient(circle at 80% 20%, rgba(1, 255, 79, 0.3) 0%, rgba(1, 255, 79, 0) 60%),
                radial-gradient(circle at 50% 90%, rgba(255, 1, 215, 0.3) 0%, rgba(255, 1, 215, 0) 60%),
                radial-gradient(circle at 30% 10%, rgba(0, 255, 255, 0.3) 0%, rgba(0, 255, 255, 0) 60%);
            animation: moveColors 30s linear infinite;
        }

        @keyframes moveColors {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5%, 5%); }
            50% { transform: translate(-5%, -5%); }
            75% { transform: translate(5%, -5%); }
            100% { transform: translate(0, 0); }
        }

        .container {
            max-width: 800px;
            margin: auto;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: var(--psychedelic-accent);
            text-shadow: 0 0 10px var(--psychedelic-accent), 0 0 20px var(--psychedelic-accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--neon-highlight);
        }

        input[type="text"], input[type="url"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--neon-highlight);
            background-color: var(--input-bg);
            color: var(--accessible-text);
            border-radius: 8px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]:focus, input[type="url"]:focus, textarea:focus {
            outline: none;
            border-color: var(--psychedelic-accent);
            box-shadow: 0 0 10px rgba(1, 255, 79, 0.5);
        }

        .button-group {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .button {
            padding: 12px 25px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s, background-color 0.3s;
            color: var(--accessible-text);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            background-color: var(--neon-highlight);
        }

            background-size: cover;
            background-position: center;
        }
        .copy-button {
            background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAQFBAYEBQUFBgYGBgYGBgYHBwgIBw4JCgoJCAgLCwsOCgwOEAwNDxUODw4OCggICggICgwQEBAQEBAMDAz/2wBDAgMDAwMDBAYEBAQGBwUGCwYLCwYLDwwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMD/wAARCAAoACgDASIAAhEBAxEB/8QAFwAAAwEBAAAAAAAAAAAAAAAAAAMFCP/EACIQAAICAQMDBQEAAAAAAAAAAAAAAAECAxEEEgAFISIGMYGRof/EABgBAQEBAQEAAAAAAAAAAAAAAAIEBwAF/8QAGhEAAgMBAQAAAAAAAAAAAAAAAgMAAREhBP/aAAwDAQACEQMRAD8A9JmG2sX7q1WvJmP8AaoW9jW6675pXh2bQj+c65d6o4tS85q4t18738D/AJh2bVw4H9aB2/pM6b/T/b3/ADX/AEv1L6f5L0f51+r+lB6z+p/p/x/qT+d/T/wCf6UBj63f8L/T/j/Umdc+1X97fSg6P8v7/AH2wQf5b3/f7A//Z');
            background-size: cover;
            background-position: center;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 1, 215, 0.7);
        }

        .output-container {
            margin-top: 40px;
        }

        h2 {
            color: var(--psychedelic-accent);
            text-align: center;
            text-shadow: 0 0 10px var(--psychedelic-accent);
        }

        pre {
            background-color: var(--input-bg);
            color: var(--accessible-text);
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .success-message {
            text-align: center;
            margin-top: 10px;
            color: var(--psychedelic-accent);
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            .button-group {
                flex-direction: column;
                gap: 10px;
            }
            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Psy-Nexus Template-Generator</h1>
    <p style="text-align: center; color: #b0b0b0;">Erstelle professionelle Event-Ankündigungen für Telegram, Discord & WhatsApp.</p>

    <div class="form-group">
        <label for="eventName">Event-Name</label>
        <input type="text" id="eventName" placeholder="z.B. Cosmic Frequencies" onkeyup="generateTemplate()">
    </div>
    <div class="form-group">
        <label for="date">Datum & Zeit</label>
        <input type="text" id="date" placeholder="z.B. Sa, 12. Okt. | 22:00 - 06:00" onkeyup="generateTemplate()">
    </div>
    <div class="form-group">
        <label for="location">Ort</label>
        <input type="text" id="location" placeholder="z.B. Club XYZ, Berlin" onkeyup="generateTemplate()">
    </div>
    <div class="form-group">
        <label for="lineup">Line-up</label>
        <textarea id="lineup" rows="3" placeholder="z.B. • Psy-Fi (Live)&#10;• Alien Sapiens (DJ Set)&#10;• Solar Frequencies" onkeyup="generateTemplate()"></textarea>
    </div>
    <div class="form-group">
        <label for="ticketLink">Ticket-Link (optional)</label>
        <input type="url" id="ticketLink" placeholder="https://www.eventlink.de" onkeyup="generateTemplate()">
    </div>
    <div class="form-group">
        <label for="description">Beschreibung (optional)</label>
        <textarea id="description" rows="4" placeholder="Eine kurze Beschreibung des Events." onkeyup="generateTemplate()"></textarea>
    </div>

    <div class="button-group">
        <button class="button generate-button" onclick="generateTemplate()">Template generieren</button>
        <button class="button copy-button" onclick="copyCode()" style="display: none;">Kopieren</button>
    </div>
